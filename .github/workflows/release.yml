name: SLSA generic generator - SismaSkeletronNginx Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digests: ${{ steps.hash.outputs.digests }}
      release_body: ${{ steps.extract_release_notes.outputs.release_body }}
      archive_path: ${{ env.ARCHIVE_PATH }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Create release archive
        id: create_archive
        run: |
          TAG_NAME="${{ github.ref_name }}"
          ZIP_NAME="${{ github.event.repository.name }}-${TAG_NAME}.zip"

          rm -rf .git
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Initial commit"

          zip -r $ZIP_NAME . \
            --exclude=".github/*" \
            --exclude="CHANGELOG.md" \
            --exclude="composer.json"

          echo "ARCHIVE_PATH=$ZIP_NAME" >> $GITHUB_ENV
          echo "zip_file_name=$ZIP_NAME" >> "${GITHUB_OUTPUT}"

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: ${{ env.ARCHIVE_PATH }}
      - name: Extract Release Notes
        id: extract_release_notes
        run: |
          TAG_NAME="${{ github.ref_name }}"
          RELEASE_VERSION="${TAG_NAME//v/}"
          RELEASE_NOTES=$(awk "/^## \\[${RELEASE_VERSION}\\]/{flag=1;next}/^## \\[/{flag=0}flag" CHANGELOG.md)

          if [ -z "$RELEASE_NOTES" ]; then
            echo "Nessuna nota di rilascio trovata per $TAG_NAME nel CHANGELOG.md."
            RELEASE_NOTES="**Release ${TAG_NAME}**\n\nNessuna nota di rilascio dettagliata trovata nel CHANGELOG.md per questa versione. Per favore, consulta il repository GitHub per il file CHANGELOG.md completo."
          fi

          echo "release_body<<EOF" >> "${GITHUB_OUTPUT}"
          echo "$RELEASE_NOTES" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"
      - name: Generate subject for provenance
        id: hash
        run: |
          set -euo pipefail
          ZIP_FILE=${{ env.ARCHIVE_PATH }}
          echo "digests=$(sha256sum $ZIP_FILE | base64 -w0)" >> "${GITHUB_OUTPUT}"


  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
      attestations: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"

  upload-attestation:
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: release-archive
          path: .

      - name: Download attestation
        uses: actions/download-artifact@v4
        with:
          pattern: "*.intoto.jsonl"
          merge-multiple: true
          path: .

      - name: List downloaded files (debug)
        run: |
          echo "All files in current directory:"
          ls -la .

      - name: Create GitHub Release with attestation
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ needs.build.outputs.release_body }}
          draft: false
          prerelease: false
          files: |
            ${{ needs.build.outputs.archive_path }}
            *.intoto.jsonl
